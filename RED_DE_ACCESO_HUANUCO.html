<div id="panel-zonas"></div>

<script>

var graph = document.getElementsByClassName('plotly-graph-div')[0]

function actualizarZonas(){

    var zonas = {}
    var total = 0

    graph.data.forEach(function(trace){

        if(trace.visible === "legendonly"){
            return
        }

        trace.customdata.forEach(function(row){

            var zona = row[0]

            zonas[zona] = (zonas[zona] || 0) + 1

            total++

        })

    })

    var html = "ZONAS<br><br>"

    for(var z in zonas){

        html += z + " : " + zonas[z] + "<br>"

    }

    document.getElementById("panel-zonas").innerHTML = html

}

graph.on('plotly_restyle', actualizarZonas)

actualizarZonas()

</script>
